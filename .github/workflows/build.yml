name: "Build and Release"

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # tauri-action replaces this with the version from tauri.conf.json
          releaseName: "OpenMusic v__VERSION__"
          releaseBody: "Automated release for open-music. Available for Windows, Linux and MacOS. Please note that there can be some bugs since this is a pre-alpha release."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.platform == 'windows-latest' && '--target x86_64-pc-windows-msvc' || '' }}

  android:
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;25.0.8775105"

      - name: install frontend dependencies
        run: npm install

      - name: Initialize Android
        run: npm run tauri android init -- --ci

      - name: Build Android APK
        run: npm run tauri android build -- --apk

      - name: Upload APK to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          APK_PATH="src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk"
          if [ -f "$APK_PATH" ]; then
            NEW_APK_NAME="OpenMusic_v${VERSION}_Universal_(Experimental).apk"
            mv "$APK_PATH" "$NEW_APK_NAME"
            gh release upload "v$VERSION" "$NEW_APK_NAME" --clobber
          else
            echo "Universal APK not found! Uploading all available APKs..."
            find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" -type f | while read -r apk; do
              filename=$(basename "$apk")
              arch_name=$(echo "$apk" | awk -F'/' '{print $(NF-2)}')
              new_name="OpenMusic_v${VERSION}_${arch_name}_(Experimental).apk"
              cp "$apk" "$new_name"
              gh release upload "v$VERSION" "$new_name" --clobber
            done
          fi
